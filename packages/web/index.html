<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="favicon.svg?v=3" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Claude Spyglass</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --accent:      #d97757;
      --accent-dim:  rgba(217,119,87,0.1);
      --bg:          #0f0f0f;
      --surface:     #161616;
      --surface-alt: #1c1c1c;
      --border:      #272727;
      --text:        #e8e8e8;
      --text-muted:  #888;
      --text-dim:    #505050;
      --green:       #4ade80;
      --orange:      #f59e0b;
      --red:         #ef4444;
      --blue:        #60a5fa;
      --left-panel-width: 280px;
      --tool-stats-height: 160px;
      --project-panel-height: 215px;
    }

    body {
      font-family: 'SF Mono','JetBrains Mono','Fira Code',ui-monospace,monospace;
      background: var(--bg);
      color: var(--text);
      font-size: 13px;
      line-height: 1.5;
      display: grid;
      grid-template-rows: auto auto auto 1fr auto;
      height: 100vh;
      overflow: hidden;
    }

    /* ─── HEADER ────────────────────────────────────────────────────── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      height: 52px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .header-left { display: flex; align-items: center; gap: 12px; }
    .logo {
      font-size: 16px; font-weight: 800;
      color: var(--accent); letter-spacing: -0.5px;
    }
    .logo span { color: var(--text); }

    .badge-live {
      display: inline-flex; align-items: center; gap: 6px;
      background: var(--accent-dim); border: 1px solid rgba(217,119,87,0.35);
      color: var(--accent); padding: 3px 10px; border-radius: 20px;
      font-size: 10px; font-weight: 700; letter-spacing: 0.6px;
    }
    .badge-live .dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--accent); animation: pulse 1.8s ease-in-out infinite;
    }
    @keyframes pulse {
      0%,100% { opacity: 1; transform: scale(1); }
      50%      { opacity: 0.4; transform: scale(0.8); }
    }
    .badge-live.disconnected {
      background: rgba(239,68,68,0.1); border-color: rgba(239,68,68,0.35); color: var(--red);
    }
    .badge-live.disconnected .dot { background: var(--red); animation: none; }

    .last-updated { color: var(--text-dim); font-size: 11px; }

    /* ─── ERROR BANNER ──────────────────────────────────────────────── */
    .error-banner {
      display: flex; align-items: center; gap: 10px;
      background: rgba(239,68,68,0.08);
      color: var(--red); font-size: 12px; flex-shrink: 0;
      max-height: 0; overflow: hidden; padding: 0 20px;
    }
    .error-banner.visible { max-height: 60px; padding: 10px 20px; border-bottom: 1px solid rgba(239,68,68,0.25); }
    .retry-btn {
      margin-left: auto; background: none; border: 1px solid var(--red);
      color: var(--red); padding: 3px 10px; border-radius: 6px;
      cursor: pointer; font-family: inherit; font-size: 11px;
    }
    .retry-btn:hover { background: rgba(239,68,68,0.12); }

    /* ─── SUMMARY STRIP ─────────────────────────────────────────────── */
    .summary-strip {
      display: flex; gap: 1px; background: var(--border);
      border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    .stat-card {
      flex: 1; display: flex; align-items: center; gap: 10px;
      padding: 8px 16px; background: var(--bg); min-width: 0;
    }
    .stat-card + .stat-card { border-left: none; }
    .stat-label {
      font-size: 10px; color: var(--text-dim);
      text-transform: uppercase; letter-spacing: 0.07em; white-space: nowrap;
    }
    .stat-value {
      font-size: 17px; font-weight: 700; white-space: nowrap;
      letter-spacing: -0.5px; color: var(--text);
    }
    .stat-card.active .stat-value { color: var(--green); }

    /* ─── MAIN LAYOUT ───────────────────────────────────────────────── */
    .main-layout {
      display: grid;
      grid-template-columns: var(--left-panel-width) 1fr;
      grid-template-rows: 1fr;
      overflow: hidden;
      min-height: 0;
    }

    /* ─── LEFT PANEL ────────────────────────────────────────────────── */
    .left-panel {
      display: grid;
      grid-template-rows: var(--project-panel-height) 1fr var(--tool-stats-height);
      overflow: hidden; border-right: 1px solid var(--border);
      background: var(--surface);
    }

    .panel-section {
      display: flex; flex-direction: column;
      overflow: hidden; border-bottom: 1px solid var(--border);
      min-height: 0;
    }
    .panel-section.flex-section { min-height: 0; }
    .panel-section:last-child { border-bottom: none; }

    .panel-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 6px 12px; background: var(--surface-alt);
      border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    .panel-label {
      font-size: 10px; font-weight: 600; color: var(--text-dim);
      text-transform: uppercase; letter-spacing: 0.08em;
    }
    .panel-hint { font-size: 10px; color: var(--text-dim); }

    .panel-body { flex: 1; overflow-y: auto; min-height: 0; }
    .panel-body::-webkit-scrollbar { width: 3px; }
    .panel-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .tool-stats-section { max-height: var(--tool-stats-height); }
    .tool-stats-section .panel-body { max-height: calc(var(--tool-stats-height) - 29px); }

    /* ─── RIGHT PANEL ───────────────────────────────────────────────── */
    .right-panel { position: relative; overflow: hidden; }

    .right-view {
      position: absolute; inset: 0;
      display: flex; flex-direction: column; overflow: hidden;
      opacity: 0; transform: translateX(6px);
      transition: opacity .18s ease, transform .18s ease;
      pointer-events: none;
    }
    .right-view.active { opacity: 1; transform: translateX(0); pointer-events: auto; }

    /* ─── DEFAULT VIEW ──────────────────────────────────────────────── */
    .view-section { border-bottom: 1px solid var(--border); flex-shrink: 0; }
    .view-section.fill { flex: 1; display: flex; flex-direction: column; min-height: 0; border-bottom: none; }
    .view-section-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 6px 16px; background: var(--surface-alt);
      border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    .chart-wrap { padding: 12px 16px 8px; }
    canvas { display: block; }

    .feed-body { flex: 1; overflow-y: auto; min-height: 0; }
    .feed-body::-webkit-scrollbar { width: 3px; }
    .feed-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* ─── DETAIL VIEW ───────────────────────────────────────────────── */
    .detail-header {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 16px; background: var(--surface-alt);
      border-bottom: 1px solid var(--border); flex-shrink: 0; flex-wrap: wrap;
    }
    .detail-meta { flex: 1; display: flex; align-items: center; gap: 10px; min-width: 0; flex-wrap: wrap; }
    .detail-session-id { font-size: 11px; color: var(--accent); font-family: monospace; }
    .detail-project    { font-size: 11px; color: var(--text-muted); }
    .detail-tokens     { font-size: 11px; color: var(--text); margin-left: auto; }
    .btn-close {
      background: none; border: 1px solid var(--border); color: var(--text-dim);
      padding: 3px 10px; border-radius: 5px; cursor: pointer;
      font-size: 11px; font-family: inherit; flex-shrink: 0;
    }
    .btn-close:hover { border-color: var(--red); color: var(--red); }

    .view-tab-bar {
      display: flex; align-items: center;
      padding: 0 16px; border-bottom: 1px solid var(--border);
      background: var(--surface-alt); flex-shrink: 0;
    }
    .view-tab {
      background: none; border: none; border-bottom: 2px solid transparent;
      color: var(--text-dim); padding: 8px 14px; font-family: inherit;
      font-size: 10px; font-weight: 600; letter-spacing: 0.5px;
      text-transform: uppercase; cursor: pointer;
      transition: color .15s, border-color .15s;
    }
    .view-tab:hover { color: var(--text); }
    .view-tab.active { color: var(--accent); border-bottom-color: var(--accent); }

    .detail-loading {
      padding: 20px 16px; text-align: center;
      color: var(--text-dim); font-size: 12px; flex-shrink: 0;
    }
    .detail-content { flex: 1; overflow-y: auto; min-height: 0; }
    .detail-content::-webkit-scrollbar { width: 3px; }
    .detail-content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* ─── FOOTER ────────────────────────────────────────────────────── */
    .footer {
      text-align: center; color: var(--text-dim); font-size: 10px;
      padding: 6px; border-top: 1px solid var(--border); flex-shrink: 0;
    }

    /* ─── TABLE ─────────────────────────────────────────────────────── */
    table { width: 100%; border-collapse: collapse; }
    th {
      text-align: left; padding: 7px 12px; font-size: 10px;
      color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px;
      border-bottom: 1px solid var(--border);
      background: rgba(255,255,255,0.02); font-weight: 500;
    }
    td {
      padding: 6px 12px; font-size: 12px; color: var(--text);
      border-bottom: 1px solid rgba(39,39,39,0.6); vertical-align: middle;
    }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(217,119,87,0.04); }

    tr.clickable { cursor: pointer; }
    tr.clickable:hover td { background: rgba(217,119,87,0.07); }
    tr.row-selected td { background: var(--accent-dim) !important; }
    tr.row-selected td:first-child { border-left: 2px solid var(--accent); padding-left: 10px; }

    .empty-hint  { padding: 20px 12px; text-align: center; color: var(--text-dim); font-size: 11px; }
    .table-empty { padding: 24px 16px; text-align: center; color: var(--text-dim); font-size: 12px; }

    /* ─── BADGES / LABELS ───────────────────────────────────────────── */
    .type-badge {
      display: inline-block; padding: 1px 6px; border-radius: 4px;
      font-size: 10px; font-weight: 600; letter-spacing: 0.2px;
    }
    .type-prompt    { background: rgba(217,119,87,0.18); color: #e8a07a; }
    .type-tool_call { background: rgba(74,222,128,0.15); color: #6ee7a0; }
    .type-system    { background: rgba(245,158,11,0.15); color: #fbbf24; }
    .type-unknown   { background: rgba(80,80,80,0.2);    color: var(--text-muted); }

    .role-badge {
      display: inline-block; padding: 1px 5px; border-radius: 3px;
      font-size: 9px; font-weight: 600; letter-spacing: 0.3px;
      margin-left: 4px; vertical-align: middle;
    }
    .role-user { background: rgba(96,165,250,0.18); color: #93c5fd; }

    .model-badge {
      display: inline-block; padding: 1px 5px; border-radius: 3px;
      font-size: 9px; font-weight: 500; margin-left: 4px; vertical-align: middle;
      background: rgba(217,119,87,0.15); color: var(--accent);
    }

    /* ─── TOOL / BARS ───────────────────────────────────────────────── */
    .tool-cell { display: flex; flex-direction: column; gap: 1px; }
    .tool-main { font-size: 12px; color: var(--text); }
    .tool-sub  { font-size: 10px; color: var(--text-dim); font-style: italic; }

    .bar-cell  { display: flex; align-items: center; gap: 8px; }
    .bar-track { flex: 1; height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; min-width: 40px; }
    .bar-fill  { height: 100%; background: var(--accent); border-radius: 2px; transition: width .4s ease; }
    .bar-label { font-size: 11px; color: var(--text-dim); min-width: 28px; text-align: right; }

    .sess-id {
      font-size: 11px; color: var(--text-muted);
      max-width: 90px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      display: inline-block;
    }

    .num    { font-variant-numeric: tabular-nums; color: var(--text-dim); }
    .num-hi { color: var(--accent); font-variant-numeric: tabular-nums; }

    /* ─── PROMPT EXPAND ─────────────────────────────────────────────── */
    .prompt-preview {
      font-size: 10px; color: var(--text-dim);
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      max-width: 200px; cursor: pointer; display: block; margin-top: 2px;
    }
    .prompt-preview:hover { color: var(--text-muted); text-decoration: underline dotted; }
    .prompt-expand-row td { padding: 0 !important; border-bottom: 1px solid var(--border); }
    .prompt-expand-box {
      background: rgba(217,119,87,0.05); border-left: 2px solid var(--accent);
      padding: 8px 16px; max-height: 300px; overflow-y: auto;
      font-size: 11px; line-height: 1.7; color: var(--text-dim);
      white-space: pre-wrap; word-break: break-all;
    }

    /* ─── SKELETON ──────────────────────────────────────────────────── */
    .skeleton {
      display: inline-block; width: 60px; height: 11px;
      background: linear-gradient(90deg, var(--border) 25%, var(--surface-alt) 50%, var(--border) 75%);
      background-size: 200% 100%; animation: shimmer 1.4s linear infinite; border-radius: 3px; vertical-align: middle;
    }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

    /* ─── TYPE DONUT ────────────────────────────────────────────────── */
    .charts-inner {
      display: grid; grid-template-columns: 2fr 1fr; gap: 0;
    }
    .donut-section { border-left: 1px solid var(--border); }
    .donut-wrap { padding: 12px 16px; display: flex; align-items: center; gap: 16px; }
    .donut-canvas { flex-shrink: 0; }
    .type-legend  { flex: 1; display: flex; flex-direction: column; gap: 6px; }
    .legend-item  { display: flex; align-items: center; gap: 6px; font-size: 11px; }
    .legend-dot   { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .legend-name  { color: var(--text-dim); flex: 1; }
    .legend-val   { color: var(--text); font-weight: 600; }
    .legend-pct   { color: var(--text-dim); min-width: 28px; text-align: right; }

    /* ─── TURN VIEW ─────────────────────────────────────────────────── */
    .turn-list { padding: 4px 0; }
    .turn-item { border-bottom: 1px solid var(--border); }
    .turn-item:last-child { border-bottom: none; }
    .turn-header {
      display: flex; align-items: center; gap: 10px;
      padding: 7px 16px; cursor: pointer; user-select: none;
      transition: background .12s;
    }
    .turn-header:hover { background: rgba(217,119,87,0.05); }
    .turn-badge {
      display: inline-block; padding: 1px 7px; border-radius: 4px;
      background: var(--accent-dim); color: var(--accent);
      font-size: 10px; font-weight: 700; letter-spacing: 0.5px; flex-shrink: 0;
    }
    .turn-time   { font-size: 11px; color: var(--text-dim); white-space: nowrap; }
    .turn-meta   { flex: 1; font-size: 11px; color: var(--text-muted); }
    .turn-tokens { font-size: 11px; color: var(--accent); font-weight: 600; white-space: nowrap; }
    .turn-toggle { font-size: 11px; color: var(--text-dim); transition: transform .2s; }
    .turn-item.open .turn-toggle  { transform: rotate(90deg); }
    .turn-item.open .turn-header  { background: rgba(217,119,87,0.04); }
    .turn-children { display: none; padding: 4px 0 6px; }
    .turn-item.open .turn-children { display: block; }
    .turn-row {
      display: grid; grid-template-columns: 28px 1fr 50px 50px 70px 80px;
      align-items: center; padding: 5px 16px 5px 32px; font-size: 12px;
    }
    .turn-row:hover { background: rgba(217,119,87,0.04); }
    .turn-row-prompt {
      background: rgba(217,119,87,0.05); border-left: 2px solid var(--accent);
      margin: 0 16px 4px; border-radius: 4px; padding-left: 12px;
    }
    .turn-row-tool  { margin: 0 16px; }
    .turn-row-empty { color: var(--text-dim); font-size: 11px; padding: 8px 32px; }
    .tool-icon { font-size: 13px; }
    .tool-icon-agent   { color: var(--orange); }
    .tool-icon-default { color: var(--green); }

    /* ─── TYPE FILTER ──────────────────────────────────────────────── */
    .type-filter-btn {
      background: none; border: 1px solid var(--border); color: var(--text-dim);
      padding: 2px 8px; border-radius: 4px; cursor: pointer;
      font-family: inherit; font-size: 10px; transition: color .12s, border-color .12s;
    }
    .type-filter-btn:hover { color: var(--text); border-color: var(--text-dim); }
    .type-filter-btn.active { color: var(--accent); border-color: var(--accent); }

    /* ─── TURN BAR ─────────────────────────────────────────────────── */
    .turn-bar { display: flex; align-items: center; gap: 4px; flex-shrink: 0; width: 84px; }
    .turn-bar .bar-track { flex: 1; min-width: 36px; }
    .turn-bar .bar-fill { background: var(--orange); }
    .turn-bar .bar-label { font-size: 10px; color: var(--text-dim); min-width: 24px; text-align: right; }

    /* ─── DETAIL AGGREGATE BADGES ────────────────────────────────────── */
    .detail-agg-badges {
      width: 100%; display: flex; gap: 8px; flex-wrap: wrap; margin-top: 4px;
    }
    .detail-agg-badge {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: 10px; color: var(--text-dim);
      background: rgba(255,255,255,0.03); border: 1px solid var(--border);
      padding: 2px 8px; border-radius: 4px; white-space: nowrap;
    }
    .detail-agg-badge strong { color: var(--accent); }

    /* ─── FLAT VIEW SUBTOTAL ─────────────────────────────────────────── */
    .flat-subtotal td {
      font-size: 11px; color: var(--text-dim); padding: 6px 12px;
      border-top: 1px solid var(--border);
      background: rgba(255,255,255,0.02) !important;
    }

    /* ─── DATE FILTER ──────────────────────────────────────────────── */
    .date-filter { display: flex; gap: 4px; align-items: center; }
    .filter-btn {
      background: none; border: 1px solid var(--border);
      color: var(--text-dim); padding: 3px 10px; border-radius: 5px;
      cursor: pointer; font-family: inherit; font-size: 10px;
      font-weight: 600; letter-spacing: 0.3px; transition: all .15s;
    }
    .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
    .filter-btn.active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }

    /* ─── RESPONSIVE ────────────────────────────────────────────────── */
    @media (max-width: 768px) {
      .main-layout { grid-template-columns: 1fr; grid-template-rows: 180px 1fr; }
      .left-panel  { grid-template-rows: none; grid-template-columns: 1fr 1fr; border-right: none; border-bottom: 1px solid var(--border); }
      .tool-stats-section { display: none; }
      .charts-inner { grid-template-columns: 1fr; }
      .donut-section { border-left: none; border-top: 1px solid var(--border); }
    }
    @media (max-width: 480px) {
      .summary-strip { flex-direction: column; gap: 1px; }
      .stat-card { padding: 6px 12px; }
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <header class="header">
    <div class="header-left">
      <div class="logo">Claude<span>Spyglass</span></div>
      <span class="badge-live" id="liveBadge"><span class="dot"></span>LIVE</span>
    </div>
    <div class="date-filter" id="dateFilter">
      <button class="filter-btn active" data-range="all">전체</button>
      <button class="filter-btn" data-range="today">오늘</button>
      <button class="filter-btn" data-range="week">이번주</button>
    </div>
    <span class="last-updated" id="lastUpdated">—</span>
  </header>

  <!-- ERROR BANNER -->
  <div class="error-banner" id="errorBanner">
    <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
      <circle cx="8" cy="8" r="6.5"/><line x1="8" y1="5" x2="8" y2="9"/><circle cx="8" cy="11.5" r="0.6" fill="currentColor"/>
    </svg>
    <span id="errorMsg">서버에 연결할 수 없습니다.</span>
    <button class="retry-btn" id="retryBtn">다시 시도</button>
  </div>

  <!-- SUMMARY STRIP -->
  <div class="summary-strip">
    <div class="stat-card">
      <span class="stat-label">총 세션</span>
      <span class="stat-value" id="statSessions"><span class="skeleton"></span></span>
    </div>
    <div class="stat-card">
      <span class="stat-label">총 요청</span>
      <span class="stat-value" id="statRequests"><span class="skeleton"></span></span>
    </div>
    <div class="stat-card">
      <span class="stat-label">총 토큰</span>
      <span class="stat-value" id="statTokens"><span class="skeleton"></span></span>
    </div>
    <div class="stat-card active">
      <span class="stat-label">활성</span>
      <span class="stat-value" id="statActive"><span class="skeleton"></span></span>
    </div>
    <div class="stat-card">
      <span class="stat-label">평균 응답시간</span>
      <span class="stat-value" id="statAvgDuration"><span class="skeleton"></span></span>
    </div>
  </div>

  <!-- MAIN LAYOUT -->
  <div class="main-layout">

    <!-- LEFT PANEL -->
    <aside class="left-panel">

      <!-- 프로젝트 -->
      <div class="panel-section flex-section">
        <div class="panel-header">
          <span class="panel-label">프로젝트</span>
          <span class="panel-hint">클릭하여 세션 조회</span>
        </div>
        <div class="panel-body">
          <table>
            <thead>
              <tr>
                <th>이름</th>
                <th style="text-align:right">세션</th>
                <th style="text-align:right">토큰</th>
              </tr>
            </thead>
            <tbody id="browserProjectsBody">
              <tr><td colspan="3" class="empty-hint"><span class="skeleton"></span></td></tr>
            </tbody>
          </table>
        </div>
      </div>

      <!-- 세션 -->
      <div class="panel-section flex-section">
        <div class="panel-header">
          <span class="panel-label">세션</span>

  <footer class="footer">Claude Spyglass — real-time Claude Code monitor</footer>

  <script>
    const API = '';

    // ── 색상 (JS 차트용) ───────────────────────────────────────────────
    const COLORS = {
      accent:  '#d97757',
      green:   '#4ade80',
      orange:  '#f59e0b',
      blue:    '#60a5fa',
      red:     '#ef4444',
      border:  '#272727',
      card:    '#161616',
      textDim: '#888888',
    };
    const TYPE_COLORS = {
      prompt:    COLORS.accent,
      tool_call: COLORS.green,
      system:    COLORS.orange,
    };

    // ── 타임라인 버킷 ─────────────────────────────────────────────────
    const TIMELINE_BUCKETS = 30;
    let timelineBuckets = Array(TIMELINE_BUCKETS).fill(0);
    let lastBucketMinute = -1;

    function nowMinute() { return Math.floor(Date.now() / 60000); }

    function advanceBuckets() {
      const cur = nowMinute();
      if (lastBucketMinute === -1) { lastBucketMinute = cur; return; }
      const diff = cur - lastBucketMinute;
      if (diff <= 0) return;
      const shift = Math.min(diff, TIMELINE_BUCKETS);
      timelineBuckets = [...timelineBuckets.slice(shift), ...Array(shift).fill(0)];
      lastBucketMinute = cur;
    }

    function recordRequest() {
      advanceBuckets();
      if (lastBucketMinute === -1) lastBucketMinute = nowMinute();
      timelineBuckets[timelineBuckets.length - 1]++;
    }

    // ── Timeline Chart ────────────────────────────────────────────────
    function drawTimeline() {
      const canvas = document.getElementById('timelineChart');
      if (!canvas) return;
      const dpr = window.devicePixelRatio || 1;
      const w = canvas.parentElement.clientWidth - 32;
      const h = 100;
      if (w <= 0) return;
      canvas.width  = w * dpr;
      canvas.height = h * dpr;
      canvas.style.width  = w + 'px';
      canvas.style.height = h + 'px';

      const ctx = canvas.getContext('2d');
      ctx.scale(dpr, dpr);
      ctx.clearRect(0, 0, w, h);

      advanceBuckets();
      const data = timelineBuckets;
      const maxVal = Math.max(...data, 1);
      const n = data.length;
      const padL = 26, padR = 8, padT = 6, padB = 18;
      const chartW = w - padL - padR;
      const chartH = h - padT - padB;

      ctx.strokeStyle = COLORS.border;
      ctx.lineWidth = 0.5;
      [0, 0.5, 1].forEach(t => {
        const y = padT + chartH * (1 - t);
        ctx.beginPath(); ctx.moveTo(padL, y); ctx.lineTo(w - padR, y); ctx.stroke();
        if (t > 0) {
          ctx.fillStyle = COLORS.textDim;
          ctx.font = '9px monospace';
          ctx.textAlign = 'right';
          ctx.fillText(Math.round(maxVal * t), padL - 3, y + 3);
        }
      });

      ctx.fillStyle = COLORS.textDim;
      ctx.font = '9px monospace';
      ctx.textAlign = 'center';
      const curMin = nowMinute();
      [0, Math.floor(n / 2), n - 1].forEach(i => {
        const minsAgo = n - 1 - i;
        const ts = new Date((curMin - minsAgo) * 60000);
        const label = ts.toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });
        const x = padL + (i / (n - 1)) * chartW;
        ctx.fillText(label, x, h - 3);
      });

      const pts = data.map((v, i) => ({
        x: padL + (i / (n - 1)) * chartW,
        y: padT + chartH * (1 - v / maxVal),
      }));

      const grad = ctx.createLinearGradient(0, padT, 0, padT + chartH);
      grad.addColorStop(0, 'rgba(217,119,87,0.3)');
      grad.addColorStop(1, 'rgba(217,119,87,0)');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.moveTo(pts[0].x, padT + chartH);
      pts.forEach(p => ctx.lineTo(p.x, p.y));
      ctx.lineTo(pts[pts.length - 1].x, padT + chartH);
      ctx.closePath();
      ctx.fill();

      ctx.strokeStyle = COLORS.accent;
      ctx.lineWidth = 1.5;
      ctx.lineJoin = 'round';
      ctx.beginPath();
      pts.forEach((p, i) => i === 0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y));
      ctx.stroke();

      const last = pts[pts.length - 1];
      ctx.beginPath();
      ctx.arc(last.x, last.y, 3, 0, Math.PI * 2);
      ctx.fillStyle = COLORS.accent;
      ctx.fill();

      if (data[data.length - 1] > 0) {
        ctx.fillStyle = COLORS.accent;
        ctx.font = 'bold 10px monospace';
        ctx.textAlign = 'left';
        ctx.fillText(data[data.length - 1], last.x + 5, last.y + 3);
      }
    }

    // ── Type Donut Chart ──────────────────────────────────────────────
    let typeData = [];

    function drawDonut() {
      const canvas = document.getElementById('typeChart');
      if (!canvas) return;
      const dpr = window.devicePixelRatio || 1;
      const size = 90;
      canvas.width  = size * dpr;
      canvas.height = size * dpr;
      canvas.style.width  = size + 'px';
      canvas.style.height = size + 'px';

      const ctx = canvas.getContext('2d');
      ctx.scale(dpr, dpr);
      ctx.clearRect(0, 0, size, size);

      const cx = size / 2, cy = size / 2, r = 36, inner = 22;
      const total = typeData.reduce((s, d) => s + d.count, 0) || 1;

      if (!typeData.length) {
        ctx.beginPath();
        ctx.arc(cx, cy, r, 0, Math.PI * 2);
        ctx.strokeStyle = COLORS.border;
        ctx.lineWidth = r - inner;
        ctx.stroke();
        return;
      }

      let startAngle = -Math.PI / 2;
      typeData.forEach(d => {
        const slice = (d.count / total) * Math.PI * 2;
        const color = TYPE_COLORS[d.type] || COLORS.textDim;
        ctx.beginPath();
        ctx.arc(cx, cy, r, startAngle, startAngle + slice);
        ctx.arc(cx, cy, inner, startAngle + slice, startAngle, true);
        ctx.closePath();
        ctx.fillStyle = color;
        ctx.fill();
        startAngle += slice;
      });

      ctx.fillStyle = '#e8e8e8';
      ctx.font = `bold ${total >= 1000 ? 12 : 15}px monospace`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(total >= 1000 ? (total / 1000).toFixed(1) + 'k' : total, cx, cy - 3);
      ctx.fillStyle = COLORS.textDim;
      ctx.font = '8px monospace';
      ctx.fillText('total', cx, cy + 9);
    }

    function renderTypeLegend() {
      const total = typeData.reduce((s, d) => s + d.count, 0) || 1;
      const el = document.getElementById('typeLegend');
      document.getElementById('typeTotal').textContent = `${total.toLocaleString('ko-KR')}건`;
      if (!typeData.length) { el.innerHTML = '<div style="color:var(--text-dim);font-size:11px">데이터 없음</div>'; return; }
      el.innerHTML = typeData.map(d => {
        const color = TYPE_COLORS[d.type] || COLORS.textDim;
        const pct = Math.round(d.count / total * 100);
        return `<div class="legend-item">
          <div class="legend-dot" style="background:${color}"></div>
          <span class="legend-name">${d.type}</span>
          <span class="legend-val">${d.count.toLocaleString('ko-KR')}</span>
          <span class="legend-pct">${pct}%</span>
        </div>`;
      }).join('');
    }

    // ── Formatters ───────────────────────────────────────────────────
    function fmt(n) { return (n ?? 0).toLocaleString('ko-KR'); }
    function formatDuration(ms) {
      if (ms === null || ms === undefined || isNaN(ms) || ms <= 0) return '—';
      if (ms < 1000) return `${ms}ms`;
      return `${(ms / 1000).toFixed(1)}s`;
    }
    function fmtToken(n) {
      if (!n) return '—';
      if (n >= 1_000_000) return (n / 1_000_000).toFixed(1) + 'M';
      if (n >= 1_000)     return (n / 1_000).toFixed(1) + 'k';
      return String(n);
    }
    function fmtTime(ts) {
      if (!ts) return '—';
      const d = new Date(ts < 1e12 ? ts * 1000 : ts);
      return d.toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    }
    function fmtDate(ts) {
      if (!ts) return '—';
      const d = new Date(ts < 1e12 ? ts * 1000 : ts);
      const isSameDay = d.toDateString() === new Date().toDateString();
      return isSameDay ? fmtTime(ts)
        : d.toLocaleDateString('ko-KR', { month: '2-digit', day: '2-digit' }) + ' ' + fmtTime(ts);
    }
    function typeBadge(type) {
      const cls = ['prompt', 'tool_call', 'system'].includes(type) ? type : 'unknown';
      let html = `<span class="type-badge type-${cls}">${cls}</span>`;
      if (type === 'prompt') html += `<span class="role-badge role-user">user</span>`;
      return html;
    }
    function parseToolDetail(raw) {
      if (!raw) return null;
      // 1. JSON parse
      try {
        const obj = JSON.parse(raw);
        if (obj && typeof obj === 'object' && !Array.isArray(obj)) {
          return Object.entries(obj).slice(0, 3)
            .map(([k, v]) => `${k}: ${typeof v === 'string' ? v : JSON.stringify(v)}`)
            .join(' · ');
        }
      } catch {}
      // 2. key=value lines
      try {
        const lines = raw.split('\n').filter(l => /^\w[\w\s]*=/.test(l.trim()));
        if (lines.length) return lines.slice(0, 3).map(l => l.trim()).join(' · ');
      } catch {}
      // 3. raw fallback
      return raw;
    }

    function toolLabel(r) {
      const base = r.tool_name;
      if (!base) return '<span style="color:var(--text-dim)">—</span>';
      const icon = toolIconHtml(base);
      const parsed = parseToolDetail(r.tool_detail);
      if (parsed) {
        const truncated = parsed.length > 80 ? parsed.slice(0, 80) + '…' : parsed;
        const subAttr = parsed.length > 80 ? ` title="${escHtml(parsed)}"` : '';
        return `<div class="tool-cell"><span class="tool-main">${icon}${escHtml(base)}</span><span class="tool-sub"${subAttr}>${escHtml(truncated)}</span></div>`;
      }
      return `<span class="tool-main">${icon}${escHtml(base)}</span>`;
    }

    const FLAT_VIEW_COLS = 6;
    const RECENT_REQ_COLS = 7;

    const PROMPT_CACHE_MAX = 500;
    const _promptCache = {};
    function promptPreview(r, maxLen = 60) {
      if (!r.payload) return '';
      try {
        const p = typeof r.payload === 'string' ? JSON.parse(r.payload) : r.payload;
        const text = p?.prompt ?? p?.content ?? p?.tool_input ?? (typeof p === 'string' ? p : '');
        if (!text) return '';
        if (Object.keys(_promptCache).length >= PROMPT_CACHE_MAX) {
          const oldest = Object.keys(_promptCache)[0];
          delete _promptCache[oldest];
        }
        _promptCache[r.id] = text;
        const preview = text.slice(0, maxLen).replace(/\n/g, ' ');
        return `<span class="prompt-preview" data-expand-id="${escHtml(r.id)}" title="클릭하여 전체 보기">${escHtml(preview)}${text.length > maxLen ? '…' : ''}</span>`;
      } catch { return ''; }
    }
    function togglePromptExpand(rid, tr) {
      document.querySelectorAll('[data-expand-for]').forEach(el => el.remove());
      if (tr.dataset.expanded === rid) { delete tr.dataset.expanded; return; }
      tr.dataset.expanded = rid;
      const text = _promptCache[rid] || '';
      const display = text;
      const lengthHint = text.length > 500 ? `\n─── 총 ${text.length.toLocaleString('ko-KR')}자 ───` : '';
      const fullDisplay = display + lengthHint;
      const expandTr = document.createElement('tr');
      expandTr.dataset.expandFor = rid;
      expandTr.className = 'prompt-expand-row';
      expandTr.innerHTML = `<td colspan="${FLAT_VIEW_COLS}"><div class="prompt-expand-box">${escHtml(fullDisplay)}</div></td>`;
      tr.after(expandTr);
    }
    function escHtml(s) {
      return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    // ── Error / Status ───────────────────────────────────────────────
    function showError(msg) {
      document.getElementById('errorMsg').textContent = msg || '서버에 연결할 수 없습니다.';
      document.getElementById('errorBanner').classList.add('visible');
      const b = document.getElementById('liveBadge');
      b.className = 'badge-live disconnected';
      b.innerHTML = '<span class="dot"></span>OFFLINE';
    }
    function clearError() {
      document.getElementById('errorBanner').classList.remove('visible');
      const b = document.getElementById('liveBadge');
      b.className = 'badge-live';
      b.innerHTML = '<span class="dot"></span>LIVE';
    }
    function setLastUpdated() {
      document.getElementById('lastUpdated').textContent = new Date().toLocaleTimeString('ko-KR');
    }

    // ── Fetch ─────────────────────────────────────────────────────────
    async function fetchDashboard() {
      try {
        const res = await fetch(`${API}/api/dashboard`, { signal: AbortSignal.timeout(8000) });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const json = await res.json();
        const d = json.data;
        document.getElementById('statSessions').textContent    = fmt(d.summary?.totalSessions ?? 0);
        document.getElementById('statRequests').textContent    = fmt(d.summary?.totalRequests ?? 0);
        document.getElementById('statTokens').textContent      = fmtToken(d.summary?.totalTokens ?? 0);
        document.getElementById('statActive').textContent      = fmt(d.summary?.activeSessions ?? 0);
        document.getElementById('statAvgDuration').textContent = formatDuration(d.summary?.avgDurationMs ?? 0);
        renderProjects(d.projects || []);
        renderTools(d.tools || []);
        typeData = (d.types || []).sort((a, b) => b.count - a.count);
        drawDonut();
        renderTypeLegend();
        clearError();
        setLastUpdated();
      } catch (err) {
        showError(`대시보드 로드 실패: ${err.message}`);
      }
    }

    async function fetchRequests(append = false) {
      if (!append) { reqOffset = 0; }
      try {
        let url;
        if (reqFilter === 'all') {
          url = buildQuery(`${API}/api/requests`, { limit: REQ_PAGE, offset: reqOffset });
        } else {
          url = buildQuery(`${API}/api/requests/by-type/${encodeURIComponent(reqFilter)}`, { limit: REQ_PAGE, offset: reqOffset });
        }
        const res = await fetch(url, { signal: AbortSignal.timeout(8000) });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const json = await res.json();
        const list = json.data || [];
        if (append) {
          appendRequests(list);
        } else {
          renderRequests(list);
        }
        reqOffset += list.length;
        const loadMoreBtn = document.getElementById('loadMoreBtn');
        if (loadMoreBtn) {
          loadMoreBtn.style.display = (list.length === REQ_PAGE && !isSSEConnected) ? '' : 'none';
        }
      } catch {
        if (!append) {
          document.getElementById('requestsBody').innerHTML =
            `<tr><td colspan="${RECENT_REQ_COLS}" class="table-empty" style="color:var(--red)">요청 목록 로드 실패</td></tr>`;
        }
      }
    }

    function appendRequests(list) {
      const body = document.getElementById('requestsBody');
      if (!list.length) return;
      const rows = list.map(r => `<tr>
        <td class="num" style="white-space:nowrap">${fmtDate(r.timestamp)}</td>
        <td>${typeBadge(r.type)}${promptPreview(r)}</td>
        <td>${toolLabel(r)}</td>
        <td class="num">${r.tokens_input > 0 ? fmtToken(r.tokens_input) : '—'}</td>
        <td class="num">${r.tokens_output > 0 ? fmtToken(r.tokens_output) : '—'}</td>
        <td class="num">${formatDuration(r.duration_ms)}</td>
        <td><span class="sess-id" title="${escHtml(r.session_id || '')}">${escHtml(r.session_id ? r.session_id.slice(0, 12) + '…' : '—')}</span></td>
      </tr>`).join('');
      body.insertAdjacentHTML('beforeend', rows);
    }

    function prependRequest(r) {
      const body = document.getElementById('requestsBody');
      // 현재 행 수가 10개 이상이면 마지막 제거
      while (body.rows.length >= 10) body.deleteRow(body.rows.length - 1);
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td class="num" style="white-space:nowrap">${fmtDate(r.timestamp)}</td>
        <td>${typeBadge(r.type)}${promptPreview(r)}</td>
        <td>${toolLabel(r)}</td>
        <td class="num">${r.tokens_input > 0 ? fmtToken(r.tokens_input) : '—'}</td>
        <td class="num">${r.tokens_output > 0 ? fmtToken(r.tokens_output) : '—'}</td>
        <td class="num">${formatDuration(r.duration_ms)}</td>
        <td><span class="sess-id" title="${escHtml(r.session_id || '')}">${escHtml(r.session_id ? r.session_id.slice(0, 12) + '…' : '—')}</span></td>
      `;
      body.insertBefore(tr, body.firstChild);
    }

    // ── Browser 상태 ─────────────────────────────────────────────────
    let selectedProject = null;
    let selectedSession = null;
    let allProjects = [];
    let allSessions = [];

    // ── 최근 요청 필터/페이지네이션 상태 ──────────────────────────────
    let reqFilter = 'all';
    let reqOffset = 0;
    const REQ_PAGE = 10;
    let isSSEConnected = false;

    // ── 날짜 필터 상태 ───────────────────────────────────────────────
    let activeRange = 'all';

    function getDateRange() {
      const now = Date.now();
      if (activeRange === 'today') {
        const start = new Date(); start.setHours(0,0,0,0);
        return { from: start.getTime(), to: now };
      }
      if (activeRange === 'week') {
        const start = new Date(); start.setDate(start.getDate() - 7); start.setHours(0,0,0,0);
        return { from: start.getTime(), to: now };
      }
      return {};
    }

    function buildQuery(base, extra = {}) {
      const range = getDateRange();
      const params = new URLSearchParams({ ...range, ...extra });
      const qs = params.toString();
      return qs ? `${base}?${qs}` : base;
    }

    // ── UI 상태 ──────────────────────────────────────────────────────
    const uiState = { rightView: 'default', detailTab: 'flat', isTransitioning: false };

    function renderRightPanel() {
      const isDetail = uiState.rightView === 'detail';
      document.getElementById('defaultView').classList.toggle('active', !isDetail);
      document.getElementById('detailView').classList.toggle('active', isDetail);
    }

    // ── Browser: 프로젝트 렌더 ──────────────────────────────────────
    function renderBrowserProjects() {
      const body = document.getElementById('browserProjectsBody');
      if (!allProjects.length) {
        body.innerHTML = '<tr><td colspan="3" class="empty-hint">데이터 없음</td></tr>';
        return;
      }
      const maxT = Math.max(...allProjects.map(p => p.total_tokens || 0), 1);
      body.innerHTML = allProjects.map(p => {
        const isSelected = selectedProject === p.project_name;
        const pct = Math.round((p.total_tokens || 0) / maxT * 100);
        return `<tr class="clickable${isSelected ? ' row-selected' : ''}" data-project="${escHtml(p.project_name)}">
          <td style="max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${escHtml(p.project_name || '')}">${escHtml(p.project_name || '—')}</td>
          <td class="num" style="text-align:right">${fmt(p.session_count)}</td>
          <td>
            <div class="bar-cell" style="justify-content:flex-end;gap:4px">
              <div class="bar-track" style="min-width:36px"><div class="bar-fill" style="width:${pct}%"></div></div>
              <span class="bar-label num-hi" style="min-width:30px">${fmtToken(p.total_tokens)}</span>
            </div>
          </td>
        </tr>`;
      }).join('');
    }

    function extractFirstPrompt(payload) {
      if (!payload) return '';
      try {
        const p = typeof payload === 'string' ? JSON.parse(payload) : payload;
        const text = p?.prompt ?? p?.content ?? (typeof p === 'string' ? p : '');
        return text ? text.slice(0, 40).replace(/\n/g, ' ') : '';
      } catch { return ''; }
    }

    // ── Browser: 세션 렌더 ──────────────────────────────────────────
    function renderBrowserSessions() {
      const body = document.getElementById('browserSessionsBody');
      const hint = document.getElementById('sessionPaneHint');
      if (!selectedProject) {
        body.innerHTML = '<tr><td colspan="4" class="empty-hint">—</td></tr>';
        hint.textContent = '프로젝트를 선택하세요';
        return;
      }
      const list = allSessions
        .filter(s => s.project_name === selectedProject)
        .sort((a, b) => (b.started_at || 0) - (a.started_at || 0));
      hint.textContent = `${list.length}개`;
      if (!list.length) {
        body.innerHTML = '<tr><td colspan="4" class="empty-hint">세션 없음</td></tr>';
        return;
      }
      body.innerHTML = list.map(s => {
        const isSelected = selectedSession === s.id;
        const isActive = !s.ended_at;
        const shortId = s.id.slice(0, 8) + '…';
        const preview = extractFirstPrompt(s.first_prompt_payload);
        return `<tr class="clickable${isSelected ? ' row-selected' : ''}" data-session-id="${escHtml(s.id)}">
          <td><span class="sess-id" title="${escHtml(s.id)}">${escHtml(shortId)}</span></td>
          <td class="num" style="white-space:nowrap;font-size:11px">
            ${fmtDate(s.started_at)}
            ${preview ? `<div style="font-size:10px;color:var(--text-dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:80px" title="${escHtml(preview)}">${escHtml(preview)}</div>` : ''}
          </td>
          <td class="num-hi" style="white-space:nowrap">${fmtToken(s.total_tokens)}</td>
          <td style="white-space:nowrap"><span style="color:${isActive ? 'var(--green)' : 'var(--text-dim)'}; font-size:11px">${isActive ? '● 활성' : '○ 종료'}</span></td>
        </tr>`;
      }).join('');
    }

    // ── 프로젝트 선택 ────────────────────────────────────────────────
    function selectProject(name) {
      selectedProject = name;
      selectedSession = null;
      if (uiState.rightView === 'detail') {
        uiState.rightView = 'default';
        renderRightPanel();
      }
      renderBrowserProjects();
      renderBrowserSessions();
      fetchSessionsByProject(name);
    }

    // ── 세션 선택 ────────────────────────────────────────────────────
    async function selectSession(id) {
      if (uiState.isTransitioning) return;
      selectedSession = id;
      renderBrowserSessions();

      uiState.rightView = 'detail';
      uiState.detailTab = 'flat';
      uiState.isTransitioning = true;
      renderRightPanel();

      document.getElementById('detailLoading').style.display = 'block';
      document.getElementById('detailFlatView').style.display = 'none';
      document.getElementById('detailTurnView').style.display = 'none';
      setDetailView('flat');

      const detailEl = document.getElementById('detailView');
      detailEl.addEventListener('transitionend', () => { uiState.isTransitioning = false; }, { once: true });

      const session = allSessions.find(s => s.id === id);
      document.getElementById('detailSessionId').textContent = session ? session.id : id;
      document.getElementById('detailProject').textContent   = session ? `📁 ${session.project_name}` : '';
      document.getElementById('detailTokens').textContent    = session ? `${fmtToken(session.total_tokens)} tokens` : '';
      document.getElementById('detailEndedAt').textContent   = session?.ended_at
        ? `종료: ${new Date(session.ended_at < 1e12 ? session.ended_at * 1000 : session.ended_at).toLocaleTimeString()}`
        : '';

      try {
        const [reqRes, turnRes] = await Promise.all([
          fetch(`${API}/api/sessions/${encodeURIComponent(id)}/requests?limit=200`),
          fetch(`${API}/api/sessions/${encodeURIComponent(id)}/turns`),
        ]);
        const [reqJson, turnJson] = await Promise.all([reqRes.json(), turnRes.json()]);
        renderDetailRequests(reqJson.data || []);
        renderTurnView(turnJson.data || []);
      } catch {
        renderDetailRequests([]);
        renderTurnView([]);
      }

      document.getElementById('detailLoading').style.display = 'none';
      setDetailView(uiState.detailTab);
    }

    // ── 세션 상세 닫기 ───────────────────────────────────────────────
    function closeDetail() {
      uiState.rightView = 'default';
      selectedSession = null;
      renderRightPanel();
      renderBrowserSessions();
      const badgesEl = document.getElementById('detailBadges');
      if (badgesEl) badgesEl.style.display = 'none';
    }

    function cacheHitBadge(r) {
      if (!r.cache_read_tokens || r.cache_read_tokens <= 0) return '';
      return `<span class="role-badge" style="background:rgba(96,165,250,0.18);color:#93c5fd" title="캐시 히트">⚡${fmtToken(r.cache_read_tokens)}</span>`;
    }

    // ── 세션 상세 렌더 ───────────────────────────────────────────────
    function renderDetailRequests(list) {
      const body = document.getElementById('detailRequestsBody');
      if (!list.length) {
        body.innerHTML = `<tr><td colspan="${FLAT_VIEW_COLS}" class="empty-hint">요청 데이터 없음</td></tr>`;
        return;
      }
      const rows = list.map(r => `<tr>
        <td class="num" style="white-space:nowrap">${fmtDate(r.timestamp)}</td>
        <td>${typeBadge(r.type)}${r.model ? `<span class="model-badge">${escHtml(r.model)}</span>` : ''}${cacheHitBadge(r)}${promptPreview(r)}</td>
        <td>${toolLabel(r)}</td>
        <td class="num">${r.tokens_input > 0 ? fmtToken(r.tokens_input) : '—'}</td>
        <td class="num">${r.tokens_output > 0 ? fmtToken(r.tokens_output) : '—'}</td>
        <td class="num">${formatDuration(r.duration_ms)}</td>
      </tr>`).join('');

      const typeCounts = {};
      list.forEach(r => { typeCounts[r.type] = (typeCounts[r.type] || 0) + 1; });
      const subtotalParts = Object.entries(typeCounts)
        .sort((a, b) => b[1] - a[1])
        .map(([type, count]) => {
          const cls = ['prompt', 'tool_call', 'system'].includes(type) ? type : 'unknown';
          return `<span class="type-badge type-${cls}">${type}</span>&nbsp;${count}건`;
        }).join('&ensp;');
      const subtotalRow = `<tr class="flat-subtotal"><td colspan="${FLAT_VIEW_COLS}" style="text-align:right">${subtotalParts}</td></tr>`;

      body.innerHTML = rows + subtotalRow;
    }

    // ── 탭 전환 ──────────────────────────────────────────────────────
    function setDetailView(tab) {
      uiState.detailTab = tab;
      document.getElementById('detailFlatView').style.display = tab === 'flat' ? '' : 'none';
      document.getElementById('detailTurnView').style.display = tab === 'turn' ? '' : 'none';
      document.getElementById('tabFlat').classList.toggle('active', tab === 'flat');
      document.getElementById('tabTurn').classList.toggle('active', tab === 'turn');
    }

    // ── 턴 아코디언 ──────────────────────────────────────────────────
    function toggleTurn(turnId) {
      const el = document.querySelector(`[data-turn-id="${CSS.escape(turnId)}"]`);
      if (el) el.classList.toggle('open');
    }

    function toolIconHtml(toolName) {
      const isAgent = toolName && /^(Agent|Skill|Task)/.test(toolName);
      return isAgent
        ? '<span class="tool-icon tool-icon-agent">◎</span>'
        : '<span class="tool-icon tool-icon-default">◉</span>';
    }

    // ── 턴 뷰 렌더 ──────────────────────────────────────────────────
    function renderTurnView(turns) {
      const container = document.getElementById('turnListBody');
      const badgesEl  = document.getElementById('detailBadges');

      if (!turns.length) {
        container.innerHTML = '<div class="turn-row-empty">턴 데이터 없음</div>';
        if (badgesEl) badgesEl.style.display = 'none';
        return;
      }

      const sessionTotalTokens = turns.reduce((s, t) => s + (t.summary.total_tokens || 0), 0);

      // 집계 배지
      if (badgesEl && sessionTotalTokens > 0) {
        const maxCostTurn = turns.reduce((a, b) =>
          (a.summary.total_tokens > b.summary.total_tokens ? a : b));
        const toolCountMap = {};
        turns.forEach(t => t.tool_calls.forEach(tc => {
          if (tc.tool_name) toolCountMap[tc.tool_name] = (toolCountMap[tc.tool_name] || 0) + 1;
        }));
        const topTool = Object.entries(toolCountMap).sort((a, b) => b[1] - a[1])[0];
        let badgesHtml = `<span class="detail-agg-badge">최고 비용 Turn: <strong>T${maxCostTurn.turn_index}</strong> (${fmtToken(maxCostTurn.summary.total_tokens)})</span>`;
        if (topTool) {
          badgesHtml += `<span class="detail-agg-badge">최다 호출 Tool: <strong>${escHtml(topTool[0])}</strong> (${topTool[1]}회)</span>`;
        }
        badgesEl.innerHTML = badgesHtml;
        badgesEl.style.display = 'flex';
      } else if (badgesEl) {
        badgesEl.style.display = 'none';
      }

      container.innerHTML = turns.map(turn => {
        const toolCount  = turn.summary.tool_call_count;
        const tokIn      = turn.summary.tokens_input ?? 0;
        const tokOut     = turn.summary.tokens_output ?? 0;
        const durMs      = turn.prompt?.duration_ms ?? 0;
        const meta = `도구 ${toolCount}개 · IN ${fmtToken(tokIn)} / OUT ${fmtToken(tokOut)}${durMs > 0 ? ` · ⏱ ${formatDuration(durMs)}` : ''}`;

        const barPct = sessionTotalTokens > 0
          ? Math.round((turn.summary.total_tokens || 0) / sessionTotalTokens * 100)
          : 0;
        const barHtml = sessionTotalTokens > 0
          ? `<div class="turn-bar"><div class="bar-track"><div class="bar-fill" style="width:${barPct}%"></div></div><span class="bar-label">${barPct}%</span></div>`
          : '';

        const promptRow = turn.prompt ? `
          <div class="turn-row turn-row-prompt">
            <span></span>
            <div class="tool-cell">
              <span class="tool-main"><span class="type-badge type-prompt">prompt</span><span class="role-badge role-user">user</span>${turn.prompt.model ? `<span class="model-badge">${escHtml(turn.prompt.model)}</span>` : ''}</span>
              ${promptPreview(turn.prompt, 80) ? `<span class="tool-sub">${promptPreview(turn.prompt, 80)}</span>` : ''}
            </div>
            <span class="num">${turn.prompt.tokens_input > 0 ? fmtToken(turn.prompt.tokens_input) : '—'}</span>
            <span class="num">${turn.prompt.tokens_output > 0 ? fmtToken(turn.prompt.tokens_output) : '—'}</span>
            <span class="num" style="color:var(--text-dim)">${formatDuration(turn.prompt.duration_ms)}</span>
            <span class="num" style="color:var(--text-dim)">${fmtTime(turn.prompt.timestamp)}</span>
          </div>` : '';

        const toolRows = turn.tool_calls.map(tc => `
          <div class="turn-row turn-row-tool">
            <span>${toolIconHtml(tc.tool_name)}</span>
            <div class="tool-cell">
              <span class="tool-main">${escHtml(tc.tool_name || '—')}</span>
              ${tc.tool_detail ? `<span class="tool-sub">${escHtml(tc.tool_detail)}</span>` : ''}
            </div>
            <span class="num">${tc.tokens_input > 0 ? fmtToken(tc.tokens_input) : '—'}</span>
            <span class="num">${tc.tokens_output > 0 ? fmtToken(tc.tokens_output) : '—'}</span>
            <span class="num" style="color:var(--text-dim)">${formatDuration(tc.duration_ms)}</span>
            <span class="num" style="color:var(--text-dim)">${fmtTime(tc.timestamp)}</span>
          </div>`).join('');

        return `<div class="turn-item" data-turn-id="${escHtml(turn.turn_id)}">
          <div class="turn-header" data-toggle-turn="${escHtml(turn.turn_id)}">
            <span class="turn-badge">T${turn.turn_index}</span>
            <span class="turn-time">${fmtTime(turn.started_at)}</span>
            <span class="turn-meta">${meta}</span>
            ${barHtml}
            <span class="turn-toggle">▸</span>
          </div>
          <div class="turn-children">
            ${promptRow}
            ${toolRows || '<div class="turn-row-empty">도구 호출 없음</div>'}
          </div>
        </div>`;
      }).join('');
    }

    // ── 전체 세션 로드 (초기/주기적 갱신용) ────────────────────────────
    async function fetchAllSessions() {
      try {
        const res = await fetch(buildQuery(`${API}/api/sessions`, { limit: 500 }));
        const json = await res.json();
        allSessions = json.data || [];
        renderBrowserSessions();
      } catch { /* silent */ }
    }

    // ── 프로젝트별 세션 로드 (프로젝트 선택 시) ─────────────────────────
    async function fetchSessionsByProject(projectName) {
      try {
        const res = await fetch(`${API}/api/projects/${encodeURIComponent(projectName)}/sessions?limit=200`);
        const json = await res.json();
        const others = allSessions.filter(s => s.project_name !== projectName);
        allSessions = [...others, ...(json.data || [])];
        renderBrowserSessions();
      } catch { /* silent */ }
    }

    // ── Renderers ────────────────────────────────────────────────────
    function renderProjects(list) {
      allProjects = list;
      renderBrowserProjects();
    }

    function renderTools(list) {
      if (!list.length) {
        document.getElementById('toolCount').textContent = '—';
        document.getElementById('toolsBody').innerHTML =
          '<tr><td colspan="4" class="table-empty"><span class="skeleton"></span></td></tr>' +
          '<tr><td colspan="4" class="table-empty"><span class="skeleton"></span></td></tr>' +
          '<tr><td colspan="4" class="table-empty"><span class="skeleton"></span></td></tr>';
        return;
      }
      document.getElementById('toolCount').textContent = `${list.length}개`;
      const body = document.getElementById('toolsBody');
      const maxC = Math.max(...list.map(t => t.call_count || 0), 1);
      body.innerHTML = list.map(t => `<tr>
        <td><div class="tool-cell">
          <span class="tool-main">${escHtml(t.tool_name || '—')}</span>
          ${t.tool_detail ? `<span class="tool-sub">${escHtml(t.tool_detail)}</span>` : ''}
        </div></td>
        <td class="num num-hi">${fmt(t.call_count)}</td>
        <td class="num">${t.avg_tokens > 0 ? fmtToken(Math.round(t.avg_tokens)) : '—'}</td>
        <td><div class="bar-cell">
          <div class="bar-track"><div class="bar-fill" style="width:${Math.round((t.call_count || 0) / maxC * 100)}%;background:var(--green)"></div></div>
          <span class="bar-label">${Math.round((t.call_count || 0) / maxC * 100)}%</span>
        </div></td>
      </tr>`).join('');
    }

    function renderRequests(list) {
      document.getElementById('requestCount').textContent = `${list.length}건`;
      const body = document.getElementById('requestsBody');
      if (!list.length) { body.innerHTML = `<tr><td colspan="${RECENT_REQ_COLS}" class="table-empty">데이터 없음</td></tr>`; return; }
      body.innerHTML = list.map(r => `<tr>
        <td class="num" style="white-space:nowrap">${fmtDate(r.timestamp)}</td>
        <td>${typeBadge(r.type)}${promptPreview(r)}</td>
        <td>${toolLabel(r)}</td>
        <td class="num">${r.tokens_input > 0 ? fmtToken(r.tokens_input) : '—'}</td>
        <td class="num">${r.tokens_output > 0 ? fmtToken(r.tokens_output) : '—'}</td>
        <td class="num">${formatDuration(r.duration_ms)}</td>
        <td><span class="sess-id" title="${escHtml(r.session_id || '')}">${escHtml(r.session_id ? r.session_id.slice(0, 12) + '…' : '—')}</span></td>
      </tr>`).join('');
    }

    // ── Manual Refresh (에러 배너용) ──────────────────────────────────
    function manualRefresh() {
      Promise.all([fetchDashboard(), fetchRequests(), fetchAllSessions()]);
    }

    // ── SSE ──────────────────────────────────────────────────────────
    let sseSource = null;
    let retryTimer = null;
    let refreshDebounce = null;

    function connectSSE() {
      if (sseSource) { sseSource.close(); sseSource = null; }
      try {
        sseSource = new EventSource(`${API}/events`);

        sseSource.addEventListener('new_request', (e) => {
          recordRequest();
          drawTimeline();

          // 이벤트 데이터로 증분 업데이트
          try {
            const evt = JSON.parse(e.data);
            const req = evt.data;

            // allSessions의 해당 세션 total_tokens 직접 업데이트
            const sess = allSessions.find(s => s.id === req.session_id);
            if (sess) {
              sess.total_tokens = req.session_total_tokens;
              renderBrowserSessions();
            }

            // 요청 피드 상단에 새 행 prepend (최대 10개 유지)
            prependRequest(req);

            // 열려있는 세션 상세 뷰 갱신
            if (selectedSession === req.session_id) selectSession(selectedSession);
          } catch { /* silent */ }

          // 요약 통계만 디바운스 갱신
          clearTimeout(refreshDebounce);
          refreshDebounce = setTimeout(() => fetchDashboard(), 1000);
        });

        sseSource.onopen = () => {
          clearError();
          clearTimeout(retryTimer);
          isSSEConnected = true;
          const loadMoreBtn = document.getElementById('loadMoreBtn');
          if (loadMoreBtn) loadMoreBtn.style.display = 'none';
          fetchDashboard();
          fetchRequests();
          fetchAllSessions();
        };
        sseSource.onerror = () => {
          isSSEConnected = false;
          sseSource.close(); sseSource = null;
          retryTimer = setTimeout(connectSSE, 5000);
        };
      } catch {
        retryTimer = setTimeout(connectSSE, 5000);
      }
    }

    // ── 이벤트 위임 ──────────────────────────────────────────────────
    function initEventDelegation() {
      // Left Panel: 프로젝트/세션 클릭
      document.querySelector('.left-panel').addEventListener('click', e => {
        const projRow = e.target.closest('[data-project]');
        if (projRow) { selectProject(projRow.dataset.project); return; }
        const sessRow = e.target.closest('[data-session-id]');
        if (sessRow) { selectSession(sessRow.dataset.sessionId); }
      });

      // 세션 상세 닫기
      document.getElementById('btnCloseDetail').addEventListener('click', closeDetail);

      // 탭 전환
      document.getElementById('detailTabBar').addEventListener('click', e => {
        const tab = e.target.closest('[data-tab]');
        if (tab) setDetailView(tab.dataset.tab);
      });

      // 에러 배너 다시 시도
      document.getElementById('retryBtn').addEventListener('click', manualRefresh);

      // 날짜 필터 버튼
      document.getElementById('dateFilter').addEventListener('click', e => {
        const btn = e.target.closest('[data-range]');
        if (!btn) return;
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        activeRange = btn.dataset.range;
        fetchDashboard(); fetchRequests(); fetchAllSessions();
      });

      // 타입 필터 버튼
      document.getElementById('typeFilterBtns').addEventListener('click', e => {
        const btn = e.target.closest('[data-filter]');
        if (!btn) return;
        reqFilter = btn.dataset.filter;
        document.querySelectorAll('.type-filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        fetchRequests(false);
      });

      // 더 보기 버튼
      document.getElementById('loadMoreBtn').addEventListener('click', () => fetchRequests(true));

      // 턴 아코디언 + 프롬프트 expand (이벤트 위임)
      document.getElementById('detailView').addEventListener('click', e => {
        const turnBtn = e.target.closest('[data-toggle-turn]');
        if (turnBtn) { toggleTurn(turnBtn.dataset.toggleTurn); return; }
        const promptEl = e.target.closest('[data-expand-id]');
        if (promptEl) {
          const tr = promptEl.closest('tr');
          if (tr) togglePromptExpand(promptEl.dataset.expandId, tr);
        }
      });

      // 최근 요청 피드 프롬프트 expand
      document.getElementById('defaultView').addEventListener('click', e => {
        const promptEl = e.target.closest('[data-expand-id]');
        if (promptEl) {
          const tr = promptEl.closest('tr');
          if (tr) togglePromptExpand(promptEl.dataset.expandId, tr);
        }
      });
    }

    // ── Canvas ResizeObserver ─────────────────────────────────────────
    function initCharts() {
      let _rafId = null;
      const timelineWrap = document.querySelector('#timelineChart').parentElement;
      if ('ResizeObserver' in window) {
        new ResizeObserver(() => {
          cancelAnimationFrame(_rafId);
          _rafId = requestAnimationFrame(() => drawTimeline());
        }).observe(timelineWrap);
      } else {
        window.addEventListener('resize', drawTimeline);
      }
    }

    // ── Init ──────────────────────────────────────────────────────────
    function init() {
      lastBucketMinute = nowMinute();
      drawTimeline();
      drawDonut();
      fetchDashboard();
      fetchRequests();
      fetchAllSessions();
      connectSSE();
      initEventDelegation();
      initCharts();
      setInterval(() => { advanceBuckets(); drawTimeline(); }, 60000);
      setInterval(() => fetchAllSessions(), 30000);
    }

    init();
  </script>
</body>
