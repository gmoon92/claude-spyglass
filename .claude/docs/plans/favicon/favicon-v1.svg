<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <title>Claude Spyglass</title>
  <!-- 배경 원 -->
  <circle cx="16" cy="16" r="15" fill="#0f0f0f" fill-opacity="0.88"/>
  <!-- 렌즈 외곽 원 -->
  <circle cx="13" cy="13" r="7.5" fill="none" stroke="#d97757" stroke-width="2.2"/>
  <!-- 렌즈 내부 광택 -->
  <circle cx="11.5" cy="11.5" r="2" fill="#d97757" fill-opacity="0.18"/>
  <!-- 손잡이 -->
  <line x1="18.8" y1="18.8" x2="25" y2="25" stroke="#d97757" stroke-width="2.5" stroke-linecap="round"/>
</svg>
