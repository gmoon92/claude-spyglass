<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <title>Claude Spyglass</title>
  <style>
    .bg        { fill: #1a1a1a; }
    .ring      { fill: none; stroke: #d97757; stroke-width: 2.5; }
    .ring-inner{ fill: none; stroke: #d97757; stroke-width: 1.5; opacity: 0.4; }
    .cross     { stroke: #d97757; stroke-width: 2; stroke-linecap: round; }
    .dot       { fill: #d97757; }
    @media (prefers-color-scheme: light) {
      .bg { fill: #f0ede8; }
    }
  </style>
  <!-- 배경: 둥근 사각, 다크/라이트 분기 -->
  <rect width="32" height="32" rx="6" class="bg"/>
  <!-- 외곽 렌즈 링 -->
  <circle cx="16" cy="16" r="11" class="ring"/>
  <!-- 내곽 링 (깊이감) -->
  <circle cx="16" cy="16" r="7" class="ring-inner"/>
  <!-- 크로스헤어: 중앙 공백으로 내곽 링 노출 -->
  <line x1="3"  y1="16" x2="11" y2="16" class="cross"/>
  <line x1="21" y1="16" x2="29" y2="16" class="cross"/>
  <line x1="16" y1="3"  x2="16" y2="11" class="cross"/>
  <line x1="16" y1="21" x2="16" y2="29" class="cross"/>
  <!-- 중앙 포커스 점 -->
  <circle cx="16" cy="16" r="2.5" class="dot"/>
</svg>
